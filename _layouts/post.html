---
layout: default
---
{% assign meta = site.categories_meta[page.category] %}
<div class="post-header pegboard">
  <div class="wrap">
    {% if meta %}
    <span class="card-badge" style="background: {{ meta.color }};">{{ meta.label }}</span>
    {% endif %}
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.tags.size > 0 %} · {{ page.tags | join: " · " }}{% endif %}
    </div>
  </div>
</div>

<article class="post-content">
  {{ content }}
</article>

<div class="post-footer">
  <a class="back-link" href="{{ '/' | relative_url }}">&larr; back to the workbench</a>
</div>
