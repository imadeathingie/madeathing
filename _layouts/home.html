---
layout: default
---
<div class="hero pegboard">
  <div class="wrap">
    <h1>{{ site.title }}</h1>
    <p class="tagline">{{ site.tagline }}</p>
  </div>
</div>

<div class="wrap">
  <div class="filters" role="tablist" aria-label="Filter projects by category">
    <button class="filter-tab is-active" data-filter="all">All</button>
    {% for cat in site.categories_meta %}
      {% assign key = cat[0] %}
      {% assign meta = cat[1] %}
      <button class="filter-tab" data-filter="{{ key }}">{{ meta.label }}</button>
    {% endfor %}
  </div>

  <div class="project-grid">
    {% assign posts = site.posts %}
    {% for post in posts %}
      {% include project-card.html post=post %}
    {% endfor %}
  </div>
</div>
