title: I Made A Thingie
tagline: "Field notes from the workbench"
description: >-
  A build log of code, 3D prints, and CAD experiments — the good runs,
  the bad prints, and everything learned in between.
# baseurl is set automatically at build time by the GitHub Actions
# workflow — leave it blank here, it's only used for local `jekyll serve`.
baseurl: ""
# Set this to your live Pages URL once deployed, e.g.
# "https://yourusername.github.io" (user site) or
# "https://yourusername.github.io/your-repo" (project site).
# jekyll-feed and jekyll-seo-tag use it to generate correct absolute URLs.
url: "https://i.madeathing.ie"

author: Thomas Hazlett
email: i@madeathing.ie
github_username:  imadeathingie

# Category metadata used throughout the theme — add a new category
# here and it'll automatically get a badge color + label everywhere.
categories_meta:
  code:
    label: "Code"
    color: "#B98B3E"
  # 3dprint:
  #   label: "3D Print"
  #   color: "#E85D2C"
  cad:
    label: "CAD"
    color: "#338040"
  coffee:
    label: "Coffee"
    color: "#3D3D3D"

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /:categories/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
