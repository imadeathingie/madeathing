<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" role="img" aria-label="NetHID — a Wi-Fi keyboard, mouse and remote on a Raspberry Pi Pico">
  <defs>
    <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f3a44"/>
      <stop offset="1" stop-color="#242d35"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <radialGradient id="led" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8ef0a3"/>
      <stop offset="0.5" stop-color="#37b24d"/>
      <stop offset="1" stop-color="#2b9d43"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="900" fill="#F6F2E8"/>

  <!-- ── the Pico board ─────────────────────────────────────────── -->
  <g filter="url(#soft)">
    <!-- USB connector -->
    <rect x="558" y="126" width="84" height="30" rx="7" fill="#9aa6ae" stroke="#7f8a92" stroke-width="2"/>
    <rect x="574" y="120" width="52" height="10" rx="3" fill="#b6c0c7"/>
    <!-- board -->
    <rect x="468" y="150" width="264" height="366" rx="20" fill="url(#pcb)" stroke="#171d23" stroke-width="3"/>
    <rect x="482" y="164" width="236" height="338" rx="13" fill="none" stroke="#3c4650" stroke-width="2"/>
  </g>

  <!-- castellated pins -->
  <g fill="#e0a93e">
    <!-- left column -->
    <rect x="462" y="196" width="16" height="14" rx="4"/><rect x="462" y="226" width="16" height="14" rx="4"/>
    <rect x="462" y="256" width="16" height="14" rx="4"/><rect x="462" y="286" width="16" height="14" rx="4"/>
    <rect x="462" y="316" width="16" height="14" rx="4"/><rect x="462" y="346" width="16" height="14" rx="4"/>
    <rect x="462" y="376" width="16" height="14" rx="4"/><rect x="462" y="406" width="16" height="14" rx="4"/>
    <rect x="462" y="436" width="16" height="14" rx="4"/><rect x="462" y="466" width="16" height="14" rx="4"/>
    <!-- right column -->
    <rect x="722" y="196" width="16" height="14" rx="4"/><rect x="722" y="226" width="16" height="14" rx="4"/>
    <rect x="722" y="256" width="16" height="14" rx="4"/><rect x="722" y="286" width="16" height="14" rx="4"/>
    <rect x="722" y="316" width="16" height="14" rx="4"/><rect x="722" y="346" width="16" height="14" rx="4"/>
    <rect x="722" y="376" width="16" height="14" rx="4"/><rect x="722" y="406" width="16" height="14" rx="4"/>
    <rect x="722" y="436" width="16" height="14" rx="4"/><rect x="722" y="466" width="16" height="14" rx="4"/>
  </g>

  <!-- RF shield (the wireless module can) -->
  <rect x="520" y="188" width="160" height="112" rx="10" fill="#cbd3d8" stroke="#aab3b9" stroke-width="2"/>
  <rect x="534" y="202" width="132" height="84" rx="6" fill="none" stroke="#b3bcc2" stroke-width="2"/>
  <text x="600" y="252" text-anchor="middle" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#7b858c" letter-spacing="1">2&#160;W</text>

  <!-- MCU chip -->
  <rect x="545" y="332" width="110" height="96" rx="7" fill="#1b232a" stroke="#333d45" stroke-width="2"/>
  <text x="600" y="386" text-anchor="middle" font-family="DejaVu Sans, monospace" font-size="16" fill="#8a97a3" letter-spacing="1">RP2350</text>

  <!-- status LED -->
  <circle cx="600" cy="470" r="9" fill="url(#led)"/>
  <text x="600" y="500" text-anchor="middle" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="14" fill="#8a97a3" letter-spacing="2">PICO&#160;2&#160;W</text>

  <!-- ── Wi-Fi broadcast from the top-right corner ──────────────── -->
  <g fill="none" stroke="#C0392B" stroke-width="8" stroke-linecap="round">
    <path d="M727.8 140.7 A45 45 0 0 1 764.3 177.2"/>
    <path d="M732.5 114.1 A72 72 0 0 1 790.9 172.5"/>
    <path d="M737.2 87.5 A99 99 0 0 1 817.5 167.8"/>
  </g>
  <circle cx="720" cy="185" r="9" fill="#C0392B"/>

  <!-- ── wordmark ───────────────────────────────────────────────── -->
  <text x="600" y="648" text-anchor="middle" font-family="DejaVu Sans, Segoe UI, Helvetica, sans-serif" font-size="112" font-weight="800" letter-spacing="-2">
    <tspan fill="#22303B">Net</tspan><tspan fill="#C0392B">HID</tspan>
  </text>

  <!-- subtitle -->
  <text x="600" y="704" text-anchor="middle" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="28" fill="#6b7680">
    a Wi-Fi keyboard, mouse &amp; remote on a Raspberry Pi Pico
  </text>

  <!-- divider + caps line -->
  <line x1="470" y1="756" x2="730" y2="756" stroke="#d9d1bf" stroke-width="2"/>
  <text x="600" y="792" text-anchor="middle" font-family="DejaVu Sans, Segoe UI, sans-serif" font-size="18" fill="#9aa6ae" letter-spacing="4">WIRELESS&#160;·&#160;USB&#160;HID&#160;·&#160;IR/RF&#160;·&#160;ON-DEVICE&#160;TLS</text>
</svg>
